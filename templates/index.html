<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Mis notas</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                max-width: 600px;
                margin: 40px auto;
                padding: 0 20px;
            }
            input, textarea {
                width: 100%;
                padding: 8px;
                margin: 6px 0;
                box-sizing: border-box;
            }
            button {
                padding: 8px 16px;
                cursor: pointer;
            }
            .note {
                border: 1px solid #ddd;
                padding: 12px;
                margin: 10px 0;
            }
            .note-actions {
                margin-top: 10px;
            }
            .edit-btn {
                background: red;
                border: none;
                border-radius: 4px;
                padding: 6px 12px;
                cursor: pointer;
                margin-right: 6px;
            }
            .delete-btn {
                background: orange;
                border: none;
                border-radius: 4px;
                padding: 6px 12px;
                cursor: pointer;
            }
            .search-form {
                margin-bottom: 20px;
                display: flex;
                gap: 8px;
            }
            .search-form input {
                margin: 0;
            }
        </style>
    </head>
    <body>
        <h1>Mis notas</h1>
        <form action="/web/notes" method="POST">
            <h2>Nueva Nota</h2>
            <input 
            type="text" 
            name="title" 
            placeholder="Título" 
            required
            >
            <textarea 
            name="content" 
            placeholder="Contenido" 
            rows="3" 
            required
            ></textarea>
            <button type="submit">Guardar</button>
        </form>

        <hr>
        <form class="search-form" action="/web" method="get">
            <input type="text" name="q" placeholder="Buscar por título..." value="{{.Query}}">
            <button type="submit">Buscar</button>
        </form>

        {{if .Notes}}
        {{range .Notes}}
        <div class="note">
            <h3>{{.Title}}</h3>
            <p>{{.Content}}</p>
            <div class="note-actions">
                <a class="edit-btn" href="/web/notes/{{.ID}}/edit">Editar</a>
                <form style="display: inline" action="/web/notes/{{.ID}}/delete" method="post">
                    <button class="delete-btn" type="submit">Borrar</button>
                </form>
            </div>
        </div>
        {{end}}
        {{else}}
        <p>No hay notas.</p>
        {{end}}

    </body>
    </html>
